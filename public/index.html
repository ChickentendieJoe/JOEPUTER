<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Joeputer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="loading" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0e27;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;">
    <div style="font-size:48px;margin-bottom:20px;animation:pulse 2s infinite;">⏳</div>
    <div style="color:#d4af37;font-size:18px;letter-spacing:2px;font-weight:700;">JOEPUTER</div>
    <style>@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }</style>
  </div>
  <div id="app" style="display:none;">
    <header class="app-header">
      <h1>JOEPUTER</h1>
      <div class="banner" id="right-now-banner">Loading…</div>
    </header>

    <main id="tab-content"></main>

    <nav class="tab-bar">
      <button class="tab-btn active" data-tab="today">📅 TODAY</button>
      <button class="tab-btn" data-tab="worlds">🌍 WORLDS</button>
      <button class="tab-btn" data-tab="feed">🎬 FEED</button>
      <button class="tab-btn" data-tab="rules">⚙️ RULES</button>
    </nav>
  </div>

  <script src="app.js"></script>
</body>
</html>
